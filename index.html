<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CICS DocHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-[#111111] text-white min-h-screen">

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full text-center">
      <div class="w-20 h-20 mx-auto bg-white rounded-2xl flex items-center justify-center shadow-2xl mb-6">
        <span class="text-5xl font-bold text-black">C</span>
      </div>
      <h1 class="text-4xl font-semibold">CICS DocHub</h1>
      <p class="text-gray-400">Digital Repository for College Excellence</p>

      <div class="glass rounded-3xl p-8 mt-10 border border-white/10">
        <input id="email-input" type="email" placeholder="name.surname@neu.edu.ph" 
               class="w-full bg-transparent border border-white/30 rounded-2xl px-5 py-4 text-lg outline-none mb-4">
        <button onclick="handleLogin()" class="w-full bg-white text-black font-semibold py-4 rounded-2xl">Sign in with NEU Account</button>
        
        <div class="grid grid-cols-2 gap-4 mt-8">
          <button onclick="demoLogin('admin')" class="bg-red-500/80 hover:bg-red-600 py-4 rounded-2xl text-sm font-medium">Demo Admin</button>
          <button onclick="demoLogin('student')" class="bg-white/10 hover:bg-white/20 py-4 rounded-2xl text-sm font-medium">Demo Student</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="hidden min-h-screen flex">

    <!-- SIDEBAR -->
    <div class="w-72 bg-black border-r border-white/10 flex flex-col">
      <div class="p-6 border-b border-white/10 flex items-center gap-3">
        <div class="w-9 h-9 bg-white rounded-2xl flex items-center justify-center text-3xl font-bold text-black">C</div>
        <div>
          <h2 class="text-2xl font-semibold">CICS DocHub</h2>
          <p id="user-role" class="text-xs tracking-widest">STUDENT</p>
        </div>
      </div>

      <nav class="flex-1 p-4 space-y-2">
        <a onclick="switchTab(0)" id="nav-0" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl bg-white/10">📚 Digital Library</a>
        <a onclick="switchTab(1)" id="nav-1" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl">👤 My Profile</a>

        <!-- ADMIN ONLY -->
        <div id="admin-menu" class="hidden pt-6">
          <div class="px-5 text-xs text-red-400 font-medium mb-3">ADMIN TOOLS</div>
          <a onclick="switchTab(2)" id="nav-2" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl">📤 Upload Document</a>
          <a onclick="switchTab(3)" id="nav-3" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl">👥 User Management</a>
          <a onclick="switchTab(4)" id="nav-4" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl">📊 Analytics & Stats</a>
        </div>
      </nav>
    </div>

    <!-- CONTENT -->
    <div class="flex-1">

      <!-- ADMIN BANNER -->
      <div id="admin-banner" class="hidden bg-gradient-to-r from-red-600 to-red-700 py-3 text-center font-medium text-sm">
        🔴 ADMIN MODE — You have full access
      </div>

      <!-- TABS -->
      <div id="tab-0" class="tab-content p-10"> <!-- Library (Student + Admin) -->
        <h1 class="text-4xl font-semibold">Digital Library</h1>
        <input id="search-input" onkeyup="filterDocuments()" placeholder="Search..." class="mt-6 w-full max-w-md bg-white/10 border border-white/30 rounded-3xl py-4 px-6">
        <div id="document-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8"></div>
      </div>

      <div id="tab-1" class="tab-content hidden p-10"> <!-- Profile -->
        <h1 class="text-4xl font-semibold">My Profile</h1>
        <div class="mt-10 glass rounded-3xl p-10 max-w-lg">
          <p>Email: <span id="profile-email" class="font-medium"></span></p>
          <p class="mt-4">Role: <span id="profile-role" class="font-medium text-emerald-400"></span></p>
        </div>
      </div>

      <!-- ADMIN TABS (Upload, Users, Analytics) - same as before but now clearly separated -->
      <!-- (I kept the exact same Upload / User Management / Analytics code from the previous version - just paste them here if you need them again) -->

    </div>
  </div>

<script>
// ==================== MAIN JS ====================
let currentRole = "student"
let currentUserEmail = ""

function demoLogin(role) {
  currentRole = role
  currentUserEmail = role === "admin" ? "jcesperanza@neu.edu.ph" : "jacqueseuan.carigma@neu.edu.ph"
  enterApp()
}

function handleLogin() {
  const email = document.getElementById("email-input").value
  if (!email.endsWith("@neu.edu.ph")) return alert("Only @neu.edu.ph allowed")
  currentRole = email.includes("jcesperanza") ? "admin" : "student"
  currentUserEmail = email
  enterApp()
}

function enterApp() {
  document.getElementById("login-screen").classList.add("hidden")
  document.getElementById("main-app").classList.remove("hidden")

  document.getElementById("user-role").textContent = currentRole.toUpperCase()
  document.getElementById("profile-email").textContent = currentUserEmail
  document.getElementById("profile-role").textContent = currentRole.toUpperCase()

  if (currentRole === "admin") {
    document.getElementById("admin-menu").classList.remove("hidden")
    document.getElementById("admin-banner").classList.remove("hidden")
    switchTab(4)           // ← Auto opens Analytics for Admin
  } else {
    switchTab(0)
  }

  // Render sample documents & users (same as before)
  renderDocuments()
}

function switchTab(n) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"))
  document.getElementById("tab-"+n).classList.remove("hidden")
}

// Sample functions (copy from previous version if needed)
function renderDocuments() {
  const grid = document.getElementById("document-grid")
  grid.innerHTML = `
    <div class="glass rounded-3xl p-6">CICS Student Handbook 2025</div>
    <div class="glass rounded-3xl p-6">BSCS Curriculum Flowchart</div>
    <div class="glass rounded-3xl p-6">Internship Requirements</div>
  `
}

function logout() { location.reload() }

// Tailwind ready
tailwind.config = {}
</script>
</body>
</html>
