<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CICS DocHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
    .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-6px); }
  </style>
</head>
<body class="bg-[#111111] text-white min-h-screen">

<!-- LOGIN -->
<div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
  <div class="max-w-md w-full">
    <div class="text-center mb-10">
      <img src="neu-logo.png" class="w-28 h-28 mx-auto rounded-full shadow-2xl">
      <h1 class="text-4xl font-semibold mt-4">CICS DocHub</h1>
    </div>

    <div class="glass rounded-3xl p-8 border border-white/10">
      <input id="email-input" type="email" placeholder="name@neu.edu.ph"
        class="w-full bg-transparent border border-white/30 rounded-2xl px-5 py-4 mb-6">
      <button onclick="handleLogin()" class="w-full bg-white text-black py-4 rounded-2xl">
        Sign in
      </button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main-app" class="hidden min-h-screen flex">

<!-- SIDEBAR -->
<div class="w-72 bg-black border-r border-white/10 flex flex-col">
  <div class="p-6 border-b border-white/10">
    <h2 class="text-2xl font-semibold">CICS DocHub</h2>
    <p id="role-badge"></p>
  </div>
  <nav id="sidebar-nav" class="flex-1 p-4"></nav>
</div>

<!-- CONTENT -->
<div class="flex-1 overflow-auto">

<!-- LIBRARY -->
<div id="tab-0" class="tab-content p-10">
  <h1 class="text-4xl mb-8">Digital Library</h1>
  <div id="document-grid" class="grid grid-cols-3 gap-6"></div>
</div>

<!-- PROFILE (UPDATED - NO LAST ACTIVE) -->
<div id="tab-1" class="tab-content hidden p-10">
  <h1 class="text-4xl mb-8">My Profile</h1>
  <div class="glass rounded-3xl p-10 max-w-2xl">
    <div class="flex justify-between mb-6">
      <div>
        <div>Email</div>
        <div id="profile-email"></div>
      </div>
      <div>
        <div>Role</div>
        <div id="profile-role"></div>
      </div>
    </div>

    <div class="flex justify-between">
      <div>
        <div>Program</div>
        <div id="profile-program"></div>
      </div>
      <div>
        <div>Status</div>
        <div class="text-emerald-400">Active</div>
      </div>
    </div>
  </div>
</div>

<!-- USER MANAGEMENT -->
<div id="tab-3" class="tab-content hidden p-10">
  <h1 class="text-4xl mb-8">User Management</h1>
  <table class="w-full">
    <thead>
      <tr>
        <th>Email</th>
        <th>Role</th>
        <th>Program</th>
        <th>Last Active</th>
      </tr>
    </thead>
    <tbody id="user-table"></tbody>
  </table>
</div>

</div>
</div>

<script>
let db = {
  users: [],
  documents: [
    { title:"Handbook", downloads:100 },
    { title:"Curriculum", downloads:50 }
  ]
};

let currentUser = null;

function saveDB() {
  localStorage.setItem("db", JSON.stringify(db));
}

function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return "🟢 Online";
  if (diff < 3600) return Math.floor(diff/60) + " min ago";
  if (diff < 86400) return Math.floor(diff/3600) + " hrs ago";
  return Math.floor(diff/86400) + " days ago";
}

function handleLogin() {
  const email = document.getElementById("email-input").value;
  currentUser = db.users.find(u => u.email === email);

  if (!currentUser) {
    currentUser = { email, role:"student", program:"BSCS", lastActive: Date.now() };
    db.users.push(currentUser);
  }

  enterApp();
}

function enterApp() {
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("main-app").classList.remove("hidden");

  document.getElementById("profile-email").textContent = currentUser.email;
  document.getElementById("profile-role").textContent = currentUser.role;
  document.getElementById("profile-program").textContent = currentUser.program;

  renderUsers();

  // 🔥 refresh table
  setInterval(() => renderUsers(), 5000);

  // 🔥 auto update activity
  setInterval(() => {
    currentUser.lastActive = Date.now();
    saveDB();
  }, 10000);

  // 🔥 real activity tracking
  ["click","mousemove","keydown","scroll"].forEach(e=>{
    document.addEventListener(e, ()=>{
      currentUser.lastActive = Date.now();
      saveDB();
    });
  });
}

function renderUsers() {
  const tbody = document.getElementById("user-table");
  tbody.innerHTML = "";

  db.users.forEach(u => {
    tbody.innerHTML += `
      <tr>
        <td>${u.email}</td>
        <td>${u.role}</td>
        <td>${u.program}</td>
        <td>${timeAgo(u.lastActive)}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
